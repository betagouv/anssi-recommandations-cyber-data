# Vérification des recommandations CIS et autres sur les configurations GitHub
# https://www.checkov.io/1.Welcome/What%20is%20Checkov.html
# https://github.com/bridgecrewio/checkov-action
---
name: Sécurité de la CI
permissions: {}
on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

  workflow_dispatch:

jobs:
  checkov:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3.6.0
        with:
          persist-credentials: false

      - name: Checkov GitHub Action
        uses: bridgecrewio/checkov-action@a7683e7b72a04503521247973281ec8142e1ac1f # v12.3112.0
        with:
          output_format: cli,sarif
          output_file_path: console,results.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@411c4c9a36b3fca4d674f06b6396b2c6d23522c6 # v3.36.3

        if: success() || failure()
        with:
          sarif_file: results.sarif
