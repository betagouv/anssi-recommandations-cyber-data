name: renovate
permissions: {}
on:
  pull_request:
    branches: ['main']

  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Lance la github action Renovate
        uses: renovatebot/github-action@v46.1.13
        with:
          configurationFile: .github/renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}